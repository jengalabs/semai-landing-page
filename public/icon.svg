<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- SVG favicon with Semai bot character -->
  <rect width="100" height="100" fill="none"/>
  
  <!-- Bot head - blue circle -->
  <circle cx="50" cy="50" cy="60" r="30" fill="#2563EB"/>
  
  <!-- Eyes - white circles -->
  <circle cx="40" cy="50" r="6" fill="white"/>
  <circle cx="60" cy="50" r="6" fill="white"/>
  
  <!-- Smile - white arc -->
  <path d="M 42 62 Q 50 68 58 62" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Antenna dot - cyan -->
  <circle cx="50" cy="25" r="4" fill="#06B6D4"/>
</svg>
